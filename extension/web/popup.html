<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Finest Checkouts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080808;
      --bg-1:      #101010;
      --bg-2:      #181818;
      --bg-3:      #202020;
      --border:    #252525;
      --border-hi: #333;
      --text:      #f0e6c8;
      --text-dim:  #7a6f56;
      --text-muted:#2e2b24;
      --gold:      #c9a84c;
      --gold-hi:   #e4be6a;
      --gold-dim:  #7a5e1e;
      --gold-glow: rgba(201,168,76,0.12);
      --mono:      'DM Mono', monospace;
      --display:   'Syne', sans-serif;
    }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-1);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .brand-logo {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-text {}
    .brand-name {
      font-family: var(--display);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--gold);
      line-height: 1.1;
    }
    .brand-sub {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    .btn-settings {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 10px;
      cursor: pointer;
      padding: 5px 10px;
      line-height: 1;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-settings:hover { border-color: var(--gold-dim); color: var(--gold); }

    /* ── Empty ── */
    .empty {
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: var(--text-dim);
    }

    /* ── Profile list ── */
    .profiles-list {
      max-height: 240px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .profiles-list::-webkit-scrollbar { width: 3px; }
    .profiles-list::-webkit-scrollbar-thumb { background: var(--bg-3); }

    .profile-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 14px;
      gap: 10px;
      border-left: 2px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .profile-row:hover { background: var(--bg-1); }
    .profile-row.is-active {
      border-left-color: var(--gold);
      background: var(--bg-1);
    }

    .profile-row-info { flex: 1; min-width: 0; }
    .profile-row-name {
      font-family: var(--display);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 1px;
    }
    .profile-row-meta {
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .active-pip {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--gold);
    }

    .btn-select {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 10px;
      padding: 4px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.12s, color 0.12s;
    }
    .btn-select:hover { border-color: var(--gold-dim); color: var(--gold); }

    /* ── Fill bar ── */
    .fill-bar {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
    }

    .btn-fill {
      width: 100%;
      background: var(--gold);
      border: none;
      border-radius: 5px;
      color: #080808;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 11px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: background 0.15s;
    }
    .btn-fill:hover:not(:disabled) { background: var(--gold-hi); }
    .btn-fill:disabled { background: var(--bg-3); color: var(--text-dim); cursor: default; }

    .fill-profile-name {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 400;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 110px;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      padding: 9px 14px;
      border-top: 1px solid var(--border);
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }
    .toggle-label { color: var(--text-dim); font-size: 11px; }

    .toggle { position: relative; display: inline-block; width: 32px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      left: 3px; top: 50%;
      transform: translateY(-50%);
      width: 10px; height: 10px;
      background: var(--text-muted);
      border-radius: 50%;
      transition: left 0.2s, background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--gold-dim); border-color: var(--gold); }
    .toggle input:checked + .toggle-track::after { left: 17px; background: var(--gold); }

    /* ── Shared ── */
    .btn-primary {
      background: var(--gold);
      border: none;
      border-radius: 5px;
      color: #080808;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      padding: 9px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary.full { width: 100%; }
    .btn-primary:hover { background: var(--gold-hi); }

    /* Gold divider line under header */
    .gold-line {
      height: 1px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }

    /* ── License Gate ── */
    .license-gate {
      padding: 24px 16px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .license-diamond {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #fdf5c0, #c4973e, #f0d060, #9a7228, #e8c060);
      transform: rotate(45deg);
      border-radius: 4px;
      position: relative;
      box-shadow: 0 0 16px rgba(196,151,62,0.4);
      margin-bottom: 4px;
      flex-shrink: 0;
    }
    .license-diamond::after {
      content: '';
      position: absolute;
      inset: 10px;
      background: linear-gradient(135deg, #e8f7ff, #7fcfee, #ffffff, #4ab8e8, #b8e4f9);
      border-radius: 2px;
    }
    .license-title {
      font-family: var(--display);
      font-size: 13px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 0.1em;
      text-align: center;
    }
    .license-sub {
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
      margin-top: -6px;
    }
    .license-input {
      width: 100%;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 10px 12px;
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.15s;
      outline: none;
    }
    .license-input::placeholder { color: var(--text-muted); text-transform: none; letter-spacing: 0.04em; }
    .license-input:focus  { border-color: var(--gold-dim); }
    .license-input.error  { border-color: #8b3a3a; }
    .license-input.success{ border-color: #3a7a4a; }
    .license-error {
      font-size: 10px;
      color: #c06060;
      text-align: center;
      min-height: 14px;
    }
    .license-link {
      font-size: 10px;
      color: var(--text-dim);
      text-align: center;
    }
    .license-link a { color: var(--gold-dim); text-decoration: none; }
    .license-link a:hover { color: var(--gold); }
    .btn-activate {
      width: 100%;
      background: var(--gold);
      border: none;
      border-radius: 5px;
      color: #080808;
      font-family: var(--display);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      padding: 11px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-activate:hover:not(:disabled) { background: var(--gold-hi); }
    .btn-activate:disabled { background: var(--bg-3); color: var(--text-dim); cursor: default; }

    /* ── Autofill hint ── */
    .autofill-hint {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 14px;
      background: #0a1a0a;
      border-bottom: 1px solid #3a7a4a;
      font-size: 10px;
      color: #7ec98a;
      line-height: 1.4;
    }
    .hint-close {
      background: none;
      border: none;
      color: #3a7a4a;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0 2px;
    }
    .hint-close:hover { color: #7ec98a; }

    /* ── Update banner ── */
    .update-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 14px;
      background: #1a1400;
      border-bottom: 1px solid var(--gold-dim);
      font-size: 10px;
      color: var(--gold);
    }
    .update-banner a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 500;
      white-space: nowrap;
    }
    .update-banner a:hover { color: var(--gold-hi); }
    .update-banner button {
      background: none;
      border: 1px solid var(--gold-dim);
      border-radius: 3px;
      color: var(--gold);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .update-banner button:hover:not(:disabled) { border-color: var(--gold); color: var(--gold-hi); }
    .update-banner button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-logo"><img src="images/logo48.png" alt="Finest"></div>
    <div class="brand-text">
      <div class="brand-name">FINEST</div>
      <div class="brand-sub">Checkouts</div>
    </div>
  </div>
  <button class="btn-settings" id="btn-settings" title="Open Dashboard">+ Add Profiles</button>
</div>
<div class="gold-line"></div>

<div id="popup-body"></div>

<script src="js/license.js"></script>
<script src="js/popup.js"></script>
</body>
</html>
